name: deploy CI/CD project
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy over SSH and run Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Creating project folder if it doesn't exist!"
            mkdir -p /root
            cd /root

            if [ ! -d "kinolarBot/.git" ]; then
              echo "Cloning repository!" 
              git clone https://github.com/XushvaqtovSardor/kinolarBot
            else
              echo "Pulling latest changes!"
              cd kinolarBot   
              git pull origin main  
            fi

            echo "Stopping containers"
            docker compose down

            echo "Removing old images to force rebuild"
            docker rmi $(docker images -q kinolarbot-app) 2>/dev/null || true

            echo "Building containers (no cache)"
            docker compose build --no-cache

            echo "Running containers"
            docker compose up -d
            
            echo "Cleaning up old images"
            docker image prune -f
